[phases.setup]
nixPkgs = ['nodejs-20_x', 'openssl_3']

[phases.install]
cmds = ['npm ci --prefer-offline --no-audit']

[phases.build]
cmds = [
  'npx prisma generate',
  'npm run build'
]

[start]
cmd = 'npm run start:prod'

[variables]
NODE_ENV = 'production'
PRISMA_CLI_BINARY_TARGETS = 'linux-musl-openssl-3.0.x'
